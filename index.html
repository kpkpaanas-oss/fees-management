<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഇമാം ഗസ്സാലി അക്കാദമി - ഫീസ് മാനേജർ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1e3a8a; margin-bottom: 5px; font-size: 24px; }
        h2 { color: #555; font-size: 16px; margin-top: 0; margin-bottom: 25px; }
        .stats-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat { padding: 15px; border-radius: 8px; color: white; font-weight: bold; font-size: 16px; }
        .total { background-color: #3b82f6; }
        .paid { background-color: #10b981; }
        .pending { background-color: #ef4444; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #1e3a8a; color: white; }
        tr:hover { background-color: #f9fafb; }
        .fee-input { width: 90px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; text-align: center; font-weight: bold; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-full { background-color: #d1fae5; color: #065f46; }
        .status-partial { background-color: #fef3c7; color: #92400e; }
        .status-none { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <h1>ഇമാം ഗസ്സാലി അക്കാദമി, മുക്കൂട്</h1>
    <h2>ഓട്ടോ ഫീസ് മാനേജ്‌മെന്റ് ഡാഷ്‌ബോർഡ്</h2>

    <div class="stats-box">
        <div class="stat total">ആകെ തുക: <span id="totalFee">₹0</span></div>
        <div class="stat paid">ആകെ കിട്ടിയത്: <span id="totalPaid">₹0</span></div>
        <div class="stat pending">ആകെ ബാക്കിയുള്ളത്: <span id="totalPending">₹0</span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>റോൾ നമ്പർ</th>
                <th>വിദ്യാർത്ഥിയുടെ പേര്</th>
                <th>ആകെ ഫീസ്</th>
                <th>അടച്ച തുക (₹)</th>
                <th>ബാക്കി തുക</th>
                <th>സ്റ്റാറ്റസ്</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>

<script>
    // കുട്ടികളുടെ ലിസ്റ്റ് (എല്ലാവർക്കും ആകെ ഫീസ് 700 രൂപ)
    const students = [
        { id: 1, name: "Aboobakar", totalFee: 700, paidAmount: 0 },
        { id: 2, name: "Fayaz", totalFee: 700, paidAmount: 0 },
        { id: 3, name: "Hisham", totalFee: 700, paidAmount: 0 },
        { id: 4, name: "Basith", totalFee: 700, paidAmount: 0 },
        { id: 5, name: "Azim", totalFee: 700, paidAmount: 0 },
        { id: 6, name: "Vahid", totalFee: 700, paidAmount: 0 },
        { id: 7, name: "Razeen", totalFee: 700, paidAmount: 0 },
        { id: 8, name: "Rihan", totalFee: 700, paidAmount: 0 },
        { id: 9, name: "Thanseer", totalFee: 700, paidAmount: 0 },
        { id: 10, name: "Bathisha", totalFee: 700, paidAmount: 0 },
        { id: 11, name: "Zayan", totalFee: 700, paidAmount: 0 }
    ];

    const tableBody = document.getElementById('studentTable');

    function updateDashboard() {
        let grandTotal = 0;
        let grandPaid = 0;
        let grandPending = 0;

        tableBody.innerHTML = "";

        students.forEach((student, index) => {
            let balance = student.totalFee - student.paidAmount;
            grandTotal += student.totalFee;
            grandPaid += student.paidAmount;
            grandPending += balance;

            let statusHTML = '';
            if (student.paidAmount === student.totalFee) {
                statusHTML = '<span class="status-badge status-full">Full Paid</span>';
            } else if (student.paidAmount > 0) {
                statusHTML = '<span class="status-badge status-partial">Partial</span>';
            } else {
                statusHTML = '<span class="status-badge status-none">Pending</span>';
            }

            let row = `<tr>
                <td>${student.id}</td>
                <td><strong>${student.name}</strong></td>
                <td>₹${student.totalFee}</td>
                <td>
                    <input type="number" class="fee-input" min="0" max="${student.totalFee}" value="${student.paidAmount}" onclick="quickSelect(this)" oninput="updateAmount(${index}, this.value)">
                </td>
                <td style="color: ${balance > 0 ? '#ef4444' : '#10b981'}; font-weight: bold;">₹${balance}</td>
                <td>${statusHTML}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });

        document.getElementById('totalFee').innerText = "₹" + grandTotal;
        document.getElementById('totalPaid').innerText = "₹" + grandPaid;
        document.getElementById('totalPending').innerText = "₹" + grandPending;
    }

    // ബോക്സിൽ ക്ലിക്ക് ചെയ്യുമ്പോൾ ഒറ്റയടിക്ക് 500 വരാൻ വേണ്ടി
    function quickSelect(inputElement) {
        if (inputElement.value == 0) {
            inputElement.value = 500;
            // ജാവസ്ക്രിപ്റ്റിനെ വിവരം അറിയിക്കാൻ
            inputElement.dispatchEvent(new Event('input'));
        }
    }

    function updateAmount(index, value) {
        let amount = parseInt(value) || 0;
        if (amount > students[index].totalFee) {
            amount = students[index].totalFee;
        }
        students[index].paidAmount = amount;
        
        // ടോട്ടൽ തുകകൾ ലൈവായി മാറാൻ പക്ഷെ ഇൻപുട്ട് ബോക്സ് റീസെറ്റ് ആവാതിരിക്കാൻ
        let balance = students[index].totalFee - amount;
        let row = tableBody.rows[index];
        
        row.cells[4].innerText = "₹" + balance;
        row.cells[4].style.color = balance > 0 ? '#ef4444' : '#10b981';
        
        if (amount === students[index].totalFee) {
            row.cells[5].innerHTML = '<span class="status-badge status-full">Full Paid</span>';
        } else if (amount > 0) {
            row.cells[5].innerHTML = '<span class="status-badge status-partial">Partial</span>';
        } else {
            row.cells[5].innerHTML = '<span class="status-badge status-none">Pending</span>';
        }
        
        // മുകളിലെ പ്രധാന ബോക്സുകൾ മാറ്റാൻ
        let grandTotal = 0;
        let grandPaid = 0;
        let grandPending = 0;
        students.forEach(s => {
            grandTotal += s.totalFee;
            grandPaid += s.paidAmount;
            grandPending += (s.totalFee - s.paidAmount);
        });
        document.getElementById('totalFee').innerText = "₹" + grandTotal;
        document.getElementById('totalPaid').innerText = "₹" + grandPaid;
        document.getElementById('totalPending').innerText = "₹" + grandPending;
    }

    updateDashboard();
</script>

</body>
</html>
