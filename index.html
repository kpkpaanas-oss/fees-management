<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ഇമാം ഗസ്സാലി അക്കാദമി - ഫീസ് മാനേജർ</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* ലോഗോ സ്റ്റൈൽ */
        .logo-container { margin-bottom: 10px; }
        .academy-logo { width: 120px; height: auto; object-fit: cover; }

        h1 { color: #1e3a8a; margin-top: 10px; margin-bottom: 5px; font-size: 24px; }
        h2 { color: #555; font-size: 16px; margin-top: 0; margin-bottom: 15px; }
        
        /* ഉസ്താദിന്റെ പേര് കാണിക്കുന്ന ബോക്സ് */
        .usthad-info {
            background-color: #eff6ff;
            border: 1px dashed #2563eb;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            color: #1e40af;
            display: inline-block;
            margin-bottom: 20px;
        }

        /* വിവരങ്ങൾ കൂടുതൽ കൃത്യമായി കാണിക്കുന്ന ബോക്സ് */
        .stats-bar { 
            background-color: #f1f5f9; 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #cbd5e1; 
            font-size: 15px; 
            font-weight: bold; 
            color: #1e293b;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .stats-item { padding: 2px 5px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #1e3a8a; color: white; }
        tr:hover { background-color: #f9fafb; }
        
        .fee-input { width: 85px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; text-align: center; font-weight: bold; }
        
        /* പേയ്മെന്റ് മോഡ് സെലക്ട് ചെയ്യാനുള്ള ഡ്രോപ്പ്ഡൗൺ സ്റ്റൈൽ */
        .pay-mode-select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-weight: bold; background-color: #fff; cursor: pointer; }
        .mode-cash { color: #854d0e; }
        .mode-gpay { color: #2563eb; }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-full { background-color: #d1fae5; color: #065f46; }
        .status-partial { background-color: #fef3c7; color: #92400e; }
        .status-none { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="logo.png" alt="ഇമാം ഗസ്സാലി അക്കാദമി ലോഗോ" class="academy-logo" onerror="this.src='https://placehold.co/120x120?text=LOGO'">
    </div>

    <h1>ഇമാം ഗസ്സാലി അക്കാദമി, മുക്കൂട്</h1>
    <h2>ഓട്ടോ ഫീസ് മാനേജ്‌മെന്റ് ഡാഷ്‌ബോർഡ്</h2>

    <div class="usthad-info">
        ഉസ്താദ്: സഅദ് സഖാഫി
    </div>

    <div class="stats-bar">
        <div class="stats-item">Total Expected: <span id="totalFee" style="color: #3b82f6;">₹0</span></div> | 
        <div class="stats-item">Total Paid: <span id="totalPaid" style="color: #10b981;">₹0</span></div> | 
        <div class="stats-item">Total Cash: <span id="totalCash" style="color: #854d0e;">₹0</span></div> | 
        <div class="stats-item">Total G-Pay: <span id="totalGpay" style="color: #2563eb;">₹0</span></div> | 
        <div class="stats-item">Total Balance: <span id="totalPending" style="color: #ef4444;">₹0</span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>റോൾ നമ്പർ</th>
                <th>വിദ്യാർത്ഥിയുടെ പേര്</th>
                <th>ആകെ ഫീസ്</th>
                <th>അടച്ച തുക (₹)</th>
                <th>Payment Mode</th>
                <th>ബാക്കി തുക</th>
                <th>സ്റ്റാറ്റസ്</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>
</div>

<script>
    // എല്ലാ 11 കുട്ടികളുടെയും പേര് വിവരങ്ങൾ
    const defaultStudents = [
        { id: 1, name: "Aboobakar", totalFee: 700, paidAmount: 0, payMode: "Cash" },
        { id: 2, name: "Fayaz", totalFee: 700, paidAmount: 0, payMode: "Cash" },
        { id: 3, name: "Hisham", totalFee: 700, paidAmount: 0, payMode: "Cash" },
        { id: 4, name: "Basith", totalFee: 700, paidAmount: 0, payMode: "Cash" },
        { id: 5, name: "Azim", totalFee: 700, paidAmount: 0, payMode: "Cash" },
        { id: 6, name: "Vahid", totalFee: 700, paidAmount: 0, payMode: "Cash" },
        { id: 7, name: "Razeen", totalFee: 700, paidAmount: 0, payMode: "Cash" },
        { id: 8, name: "Rihan", totalFee: 700, paidAmount: 0, payMode: "Cash" },
        { id: 9, name: "Thanseer", totalFee: 700, paidAmount: 0, payMode: "Cash" },
        { id: 10, name: "Bathisha", totalFee: 700, paidAmount: 0, payMode: "Cash" },
        { id: 11, name: "Zayan", totalFee: 700, paidAmount: 0, payMode: "Cash" }
    ];

    // ബ്രൗസറിൽ മുൻപ് സേവ് ചെയ്ത ഡാറ്റ ഉണ്ടെങ്കിൽ അത് ലോഡ് ചെയ്യും
    let students = JSON.parse(localStorage.getItem('feeDataWithMode')) || defaultStudents;

    const tableBody = document.getElementById('studentTable');

    function updateDashboard() {
        let grandTotal = 0;
        let grandPaid = 0;
        let grandPending = 0;
        let grandCash = 0;
        let grandGpay = 0;

        tableBody.innerHTML = "";

        students.forEach((student, index) => {
            let balance = student.totalFee - student.paidAmount;
            grandTotal += student.totalFee;
            grandPaid += student.paidAmount;
            grandPending += balance;

            if (student.payMode === "Cash") {
                grandCash += student.paidAmount;
            } else if (student.payMode === "G-Pay") {
                grandGpay += student.paidAmount;
            }

            let statusHTML = '';
            if (student.paidAmount === student.totalFee) {
                statusHTML = '<span class="status-badge status-full">Paid</span>';
            } else if (student.paidAmount > 0) {
                statusHTML = '<span class="status-badge status-partial">Partial</span>';
            } else {
                statusHTML = '<span class="status-badge status-none">Pending</span>';
            }

            let isCashSelected = student.payMode === "Cash" ? "selected" : "";
            let isGpaySelected = student.payMode === "G-Pay" ? "selected" : "";

            let row = `<tr>
                <td>${student.id}</td>
                <td><strong>${student.name}</strong></td>
                <td>₹${student.totalFee}</td>
                <td>
                    <input type="number" class="fee-input" min="0" max="${student.totalFee}" value="${student.paidAmount}" onclick="quickSelect(this)" oninput="updateAmount(${index}, this.value)">
                </td>
                <td>
                    <select class="pay-mode-select ${student.payMode === 'G-Pay' ? 'mode-gpay' : 'mode-cash'}" onchange="updateMode(${index}, this.value)">
                        <option value="Cash" ${isCashSelected}>💵 Cash</option>
                        <option value="G-Pay" ${isGpaySelected}>📱 G-Pay</option>
                    </select>
                </td>
                <td style="color: ${balance > 0 ? '#ef4444' : '#10b981'}; font-weight: bold;">₹${balance}</td>
                <td>${statusHTML}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });

        document.getElementById('totalFee').innerText = "₹" + grandTotal;
        document.getElementById('totalPaid').innerText = "₹" + grandPaid;
        document.getElementById('totalCash').innerText = "₹" + grandCash;
        document.getElementById('totalGpay').innerText = "₹" + grandGpay;
        document.getElementById('totalPending').innerText = "₹" + grandPending;
    }

    function quickSelect(inputElement) {
        if (inputElement.value == 0) {
            inputElement.value = 500;
            inputElement.dispatchEvent(new Event('input'));
        }
    }

    function updateAmount(index, value) {
        let amount = parseInt(value) || 0;
        if (amount > students[index].totalFee) {
            amount = students[index].totalFee;
        }
        students[index].paidAmount = amount;
        
        saveAndRefreshStats();
    }

    function updateMode(index, mode) {
        students[index].payMode = mode;
        saveAndRefreshStats();
    }

    function saveAndRefreshStats() {
        localStorage.setItem('feeDataWithMode', JSON.stringify(students));
        
        let grandTotal = 0;
        let grandPaid = 0;
        let grandPending = 0;
        let grandCash = 0;
        let grandGpay = 0;

        students.forEach((s, index) => {
            let balance = s.totalFee - s.paidAmount;
            grandTotal += s.totalFee;
            grandPaid += s.paidAmount;
            grandPending += balance;

            if (s.payMode === "Cash") {
                grandCash += s.paidAmount;
            } else if (s.payMode === "G-Pay") {
                grandGpay += s.paidAmount;
            }

            let row = tableBody.rows[index];
            row.cells[5].innerText = "₹" + balance;
            row.cells[5].style.color = balance > 0 ? '#ef4444' : '#10b981';
            
            let selectEl = row.cells[4].querySelector('select');
            if (s.payMode === 'G-Pay') {
                selectEl.className = 'pay-mode-select mode-gpay';
            } else {
                selectEl.className = 'pay-mode-select mode-cash';
            }

            if (s.paidAmount === s.totalFee) {
                row.cells[6].innerHTML = '<span class="status-badge status-full">Paid</span>';
            } else if (s.paidAmount > 0) {
                row.cells[6].innerHTML = '<span class="status-badge status-partial">Partial</span>';
            } else {
                row.cells[6].innerHTML = '<span class="status-badge status-none">Pending</span>';
            }
        });

        document.getElementById('totalFee').innerText = "₹" + grandTotal;
        document.getElementById('totalPaid').innerText = "₹" + grandPaid;
        document.getElementById('totalCash').innerText = "₹" + grandCash;
        document.getElementById('totalGpay').innerText = "₹" + grandGpay;
        document.getElementById('totalPending').innerText = "₹" + grandPending;
    }

    updateDashboard();
</script>

</body>
</html>
